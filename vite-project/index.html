<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Início | Gerenciador</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="sidebar">
  <div class="logo-container">
    <h2><i class="fa-solid fa-list-check"></i> Gerenciador</h2>
  </div>

  <nav>
    <a href="index.html" class="active">
      <i class="fa-solid fa-house"></i> Início
    </a>
    <a href="cadastro.html">
      <i class="fa-solid fa-plus"></i> Cadastro
    </a>
    <a href="listagem.html">
      <i class="fa-solid fa-table"></i> Listagem
    </a>
  </nav>
</div>

<div class="content">
  <header class="page-header">
    <p class="subtitle">Painel de Controle</p>
    <h1>Gerenciador de Tarefas</h1>
    <p class="welcome-text">Bem-vindo ao sistema</p>
  </header>

  <div class="dashboard-grid">
    <div class="card chart-card">
      <h3>Visão Geral do Projeto</h3>
      <div class="chart-container">
        <canvas id="graficoTarefas"></canvas>
      </div>
    </div>

    <div class="stats-container">
      <div class="card stat-card">
        <span class="stat-number" id="total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="card stat-card">
        <span class="stat-number" id="concluidas">0</span>
        <span class="stat-label">Concluídas</span>
      </div>
      <div class="card stat-card">
        <span class="stat-number" id="pendentes">0</span>
        <span class="stat-label">Pendentes</span>
      </div>
    </div>
  </div>
</div>

<script>
  let tarefas = JSON.parse(localStorage.getItem("tarefas")) || [];

  let total = tarefas.length;
  let pendentes = tarefas.filter(t => t.status === "Pendente").length;
  let concluidas = tarefas.filter(t => t.status === "Concluído").length;

  document.getElementById('total').innerText = total;
  document.getElementById('pendentes').innerText = pendentes;
  document.getElementById('concluidas').innerText = concluidas;

  const ctx = document.getElementById('graficoTarefas');

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Concluídas', 'Pendentes'],
      datasets: [{
        data: [concluidas, pendentes],
        backgroundColor: ['#5c7c73', '#2a2d35'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      cutout: '75%',
      plugins: {
        legend: { display: false }
      }
    }
  });
</script>
</body>
</html>
